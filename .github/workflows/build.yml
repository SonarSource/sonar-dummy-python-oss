name: Build
on:
  push:
    branches:
      - master
      - branch-*
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  build:
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}
    runs-on:
      group: sonar-dev
      labels: github-ubuntu-latest-s
    name: Build
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: SonarSource/ci-github-actions/build-poetry@feat/jcarsique/BUILD-11521-selfHostedRepox # dogfood
        with:
          repox-url: https://repox.dev.sonar.build
          sonar-platform: sqc-eu
          deploy-pull-request: true
          provenance: 'true'

  promote:
    needs:
      - build
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}
    runs-on:
      group: sonar-dev
      labels: github-ubuntu-latest-s    name: Promote
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: SonarSource/ci-github-actions/promote@feat/jcarsique/BUILD-11521-selfHostedRepox # dogfood
        with:
          repox-url: https://repox.dev.sonar.build
          promote-pull-request: true